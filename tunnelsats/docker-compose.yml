version: "3.7"

services:
  tunnelsats:
    build:
      context: https://github.com/BuffaloDyl/ts-umbrel-app.git#refork-low-impact-widget
      dockerfile: Dockerfile
    container_name: tunnelsats
    restart: on-failure
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - apparmor:unconfined
    volumes:
      # Persistent peer directory (Uninstall-safe)
      - ${APP_DATA_DIR}/../tunnelsats-data:/data
      # Migration source support for legacy users
      - ${APP_DATA_DIR}/.:/migration_source:ro
      # Lightning Node config mounts (Graceful discovery via relative paths)
      # These use relative paths to avoid the strict Umbrel "AND" dependency requirement
      - ${APP_DATA_DIR}/../lightning/data/lnd:/lightning-data/lnd
      - ${APP_DATA_DIR}/../core-lightning/data/lightningd/bitcoin:/lightning-data/cln
      # Host socket (For container detection & Docker API access)
      - /var/run/docker.sock:/var/run/docker.sock:ro
  widget-proxy:
    build:
      context: https://github.com/BuffaloDyl/ts-umbrel-app.git#refork-low-impact-widget
      dockerfile: Dockerfile
    container_name: widget-proxy
    restart: on-failure
    entrypoint:
      - python3
      - /app/server/widget_proxy.py
    volumes:
      - ${APP_DATA_DIR}/../tunnelsats-data:/data:ro
      - ${APP_DATA_DIR}/../lightning/data/lnd:/lightning-data/lnd:ro
      - ${APP_DATA_DIR}/../core-lightning/data/lightningd/bitcoin:/lightning-data/cln:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
