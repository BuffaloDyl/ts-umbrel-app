services:
  tunnelsats:
    # Build from the community-store git repo root so Dockerfile can see
    # scripts/, web/, server/, and tunnelsats/ in one context.
    build:
      context: https://app.buffalodyl.com/umbrel-store/umbrel-store.git#master
      dockerfile: Dockerfile
    container_name: tunnelsats
    restart: on-failure
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - apparmor:unconfined
    volumes:
      # Persistent peer directory (Uninstall-safe)
      - ${APP_DATA_DIR}/../tunnelsats-data:/data
      # Migration source support for legacy users
      - ${APP_DATA_DIR}/.:/migration_source:ro
      # Lightning Node config mounts (Graceful discovery via relative paths)
      # These use relative paths to avoid the strict Umbrel "AND" dependency requirement
      - ${APP_DATA_DIR}/../lightning/data/lnd:/lightning-data/lnd
      - ${APP_DATA_DIR}/../core-lightning/data/lightningd/bitcoin:/lightning-data/cln
      # Host socket (For container detection & Docker API access)
      - /var/run/docker.sock:/var/run/docker.sock:ro
  widget-proxy:
    # Umbrel widgets resolve endpoints via compose service name -> container IP.
    # Keep this bridge-networked proxy separate from the host-networked main app.
    build:
      context: https://app.buffalodyl.com/umbrel-store/umbrel-store.git#master
      dockerfile: Dockerfile
    restart: on-failure
    entrypoint:
      - python3
      - /app/server/widget_proxy.py
    extra_hosts:
      - "host.docker.internal:host-gateway"
