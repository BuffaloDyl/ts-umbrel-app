version: '3.7'
services:
  tunnelsats:
    image: tunnelsats/umbrel-app:v2.0.0
    container_name: tunnelsats
    restart: on-failure
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - apparmor:unconfined
    volumes:
      # Mount the app's persistent storage for configs
      - ${APP_DATA_DIR:-./data}/data:/data
      # Required to interrogate container IPs dynamically (Umbrel 1.6+)
      - /var/run/docker.sock:/var/run/docker.sock:ro
